<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>HTML Entities and Favicon</title>

    <!-- Favicon Setup -->
    <link rel="icon" type="image/png" href="favicon.png">

</head>
<body>

    <h1>HTML Entities Example</h1>

    <p>Less than symbol: &lt;</p>
    <p>Greater than symbol: &gt;</p>
    <p>Ampersand symbol: &amp;</p>
    <p>Double quotes: &quot;Hello&quot;</p>
    <p>Single quote: &apos;</p>
    <p>Copyright: &copy; 2026</p>
    <p>Trademark: &trade;</p>
    <p>Non-breaking space example: Hello&nbsp;&nbsp;&nbsp;World</p>

</body>
</html>
