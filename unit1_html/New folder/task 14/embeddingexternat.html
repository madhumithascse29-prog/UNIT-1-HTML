<!DOCTYPE html>
<html>
<head>
    <title>Embedding Example</title>
</head>
<body>

<h2>Embedded YouTube Video</h2>
<iframe width="560" height="315"
    src="https://www.youtube.com/embed/VIDEO_ID"
    title="YouTube video"
    allowfullscreen>
</iframe>

<h2>Embedded Google Map</h2>
<iframe 
    src="https://www.google.com/maps/embed?pb=..."
    width="600"
    height="450"
    loading="lazy"
    title="Location Map">
</iframe>

</body>
</html>
