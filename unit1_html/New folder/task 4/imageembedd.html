<!DOCTYPE html>
<html>
<head>
    <title>HTML Images Task</title>
</head>
<body>

    <h1>Image Embedding Example</h1>

    <!-- Basic Image -->
    <h2>Basic Image</h2>
    <img src="https://via.placeholder.com/200" 
         alt="Sample Image" 
         title="This is a sample image">

    <hr>

    <!-- Image with Width and Height -->
    <h2>Image with Width and Height</h2>
    <img src="https://via.placeholder.com/300" 
         alt="Resized Image" 
         width="200" 
         height="150">

    <hr>

    <!-- Linking an Image -->
    <h2>Image as a Link</h2>
    <a href="https://www.google.com" target="_blank">
        <img src="https://via.placeholder.com/150" 
             alt="Google Link Image"
             title="Click to visit Google">
    </a>

</body>
</html>
