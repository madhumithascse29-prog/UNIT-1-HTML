<!DOCTYPE html>
<html>
<head>
    <title>Audio and Video Task</title>
</head>
<body>

    <h1>Audio and Video Embedding Example</h1>

    <!-- Audio Example -->
    <h2>Audio Player</h2>
    <audio controls>
        <source src="sample-audio.mp3" type="audio/mpeg">
        <source src="sample-audio.ogg" type="audio/ogg">
        Your browser does not support the audio element.
    </audio>

    <hr>

    <!-- Audio with Autoplay and Loop -->
    <h2>Audio with Autoplay</h2>
    <audio controls autoplay loop muted>
        <source src="sample-audio.mp3" type="audio/mpeg">
    </audio>

    <hr>

    <!-- Video Example -->
    <h2>Video Player</h2>
    <video width="400" height="250" controls>
        <source src="sample-video.mp4" type="video/mp4">
        <source src="sample-video.webm" type="video/webm">
        Your browser does not support the video tag.
    </video>

    <hr>

    <!-- Video with Autoplay -->
    <h2>Video with Autoplay</h2>
    <video width="400" controls autoplay loop muted>
        <source src="sample-video.mp4" type="video/mp4">
    </video>

</body>
</html>
