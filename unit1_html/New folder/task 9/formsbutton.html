<!DOCTYPE html>
<html>
<head>
    <title>HTML Forms - Controls</title>

    <style>
        form {
            width: 350px;
            padding: 15px;
            border: 1px solid black;
        }
        fieldset {
            margin-bottom: 15px;
            padding: 10px;
        }
        input, select, textarea {
            width: 100%;
            margin-bottom: 10px;
            padding: 5px;
        }
        .inline {
            width: auto;
        }
        button {
            padding: 5px 10px;
        }
    </style>
</head>
<body>

    <h1>Student Feedback Form</h1>

    <form action="#" method="post">

        <!-- Personal Details Group -->
        <fieldset>
            <legend>Personal Details</legend>

            <label>Name:</label>
            <input type="text" placeholder="Enter your name" required>

            <label>Email:</label>
            <input type="email" placeholder="Enter your email" required>
        </fieldset>

        <!-- Course Selection Group -->
        <fieldset>
            <legend>Course Details</legend>

            <label>Select Course:</label>
            <select required>
                <option value="">-- Select Course --</option>
                <option>HTML</option>
                <option>CSS</option>
                <option>JavaScript</option>
            </select>
        </fieldset>

        <!-- Gender (Radio Buttons) -->
        <fieldset>
            <legend>Gender</legend>

            <input type="radio" name="gender" class="inline"> Male
            <input type="radio" name="gender" class="inline"> Female
        </fieldset>

        <!-- Skills (Checkboxes) -->
        <fieldset>
            <legend>Skills</legend>

            <input type="checkbox" class="inline"> HTML
            <input type="checkbox" class="inline"> CSS
            <input type="checkbox" class="inline"> JavaScript
        </fieldset>

        <!-- Textarea -->
        <fieldset>
            <legend>Feedback</legend>

            <label>Your Feedback:</label>
            <textarea rows="4" placeholder="Write your feedback here..."></textarea>
        </fieldset>

        <!-- Buttons -->
        <button type="submit">Submit</button>
        <button type="reset">Reset</button>

    </form>

</body>
</html>
